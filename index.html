var SENT = JSON.parse(localStorage.getItem("wa_daily_v1") || "{}");
function save(){ localStorage.setItem("wa_daily_v1", JSON.stringify(SENT)); }
function mark(n){ SENT[n]=Date.now(); save(); }

function send(e, num, digits, msg){
    e.preventDefault();
    var url = "https://wa.me/" + digits + "?text=" + encodeURIComponent(msg);
    mark(num);
    window.open(url, "_blank");
    setTimeout(render, 400);
}

function renderList(data, containerId){
    var html = "", sentCount = 0;
    data.forEach(function(c){
        if(SENT[c.n]) sentCount++;
        var cls = SENT[c.n] ? " sent" : "";
        html += '<div class="card"><div class="info">' +
          '<div class="n">' + c.n + '</div>' +
          '<div class="name">' + (c.name||"-") + '</div>' +
          '<div class="ctx">' + (c.g||"") + '</div></div>' +
          '<a class="send'+cls+'" href="#" onclick="send(event,\'' + c.n + '\',\'' + c.d + '\',\'' + c.m.replace(/'/g,"\\'") + '\')">' +
          (SENT[c.n] ? '已发' : '发送') + '</a></div>';
    });
    document.getElementById(containerId).innerHTML = html || '<div class="empty">全部已发送 ✅</div>';
    return sentCount;
}

function render(){
    var p = DATA.filter(function(c){ return c.g.indexOf("优质")>=0; });
    var f = DATA.filter(function(c){ return c.g.indexOf("粉丝")>=0; });
    var s1 = renderList(p, "premiumList");
    var s2 = renderList(f, "fansList");
    document.getElementById("stat").textContent = "已发 " + (s1+s2) + "/" + DATA.length;
}
render();
