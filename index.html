<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#09090b;color:#a1a1aa;padding-bottom:90px}

.tab.active{color:#34d399;border-bottom-color:#34d399}
.tab.active.p0{color:#818cf8;border-bottom-color:#818cf8}
.tab .badge{font-size:10px;opacity:.7;margin-left:3px}
.panel{display:none}

.card{margin:4px 10px;padding:10px 14px;background:#131317;border:1px solid #1f1f28;border-radius:8px}
.card .top{display:flex;align-items:center;gap:10px}
.card .info{flex:1;min-width:0}
.card .n{font-size:14px;font-weight:600;color:#f4f4f5;font-family:monospace}
.card .name{font-size:11px;color:#818cf8;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .ctx{font-size:10px;color:#52525b;margin-top:1px}
.card .send{flex-shrink:0;padding:7px 14px;border-radius:18px;font-size:13px;font-weight:600;text-decoration:none;background:#25d366;color:#fff;white-space:nowrap}
.card .actions{display:flex;gap:6px;margin-top:8px;align-items:center}
.card .btn{flex:1;padding:7px 0;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;text-align:center;color:#fff;transition:.15s}
.card .btn-contact{background:#059669}
.card .btn-contact.done{background:#064e3b;color:#6ee7b7;pointer-events:none}
.card .btn-skip{background:#6b21a8}
.card .btn-skip.done{background:#3b0764;color:#c084fc;pointer-events:none}
.card .reason-input{display:none;margin-top:6px;width:100%;padding:8px;border-radius:6px;border:1px solid #6b21a8;background:#1a1a20;color:#c084fc;font-size:12px;outline:none}
.card .reason-save{display:none;margin-top:4px;padding:5px 12px;border-radius:4px;background:#6b21a8;color:#fff;border:none;cursor:pointer;font-size:11px}
.card.done{opacity:.5;border-color:#064e3b}
.card.skipped{opacity:.5;border-color:#3b0764}
.summary{position:fixed;bottom:0;left:0;right:0;background:#131317;border-top:1px solid #1f1f28;padding:10px 14px;display:flex;gap:8px;z-index:10;justify-content:space-between;align-items:center}
.summary .nums{font-size:12px;color:#63636e}
.summary .sync-btn{padding:8px 16px;border-radius:6px;background:#2563eb;color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}
.toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#059669;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:100;display:none}
.section-header{padding:10px 14px 4px;font-size:14px;font-weight:700}
.section-header.premium{color:#34d399}
.section-header.p0{color:#818cf8}
</style></head><body>

</div>

<script>
var PREMIUM = [{"rid": "recvowJ00au34V", "tid": "tblOUVcGAskyrsbL", "label": "优质线索", "n": "+8613262396206", "d": "8613262396206", "m": "Hi! I'm a shoe supplier from China (Putian). Factory-direct sneakers, best prices. Want to see our catalog?", "name": "أحمد شحاته في الصين", "g": "中国", "note": "提到中国/义乌 — 人在中国的阿拉伯商人（主页显示+8614757860801）"}, {"rid": "recvowJ00afbbD", "tid": "tblOUVcGAskyrsbL", "label": "优质线索", "n": "+201223661877", "d": "201223661877", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "سنتر المصطفى", "g": "埃及", "note": "FB用户"}, {"rid": "recvowJ00aWotf", "tid": "tblOUVcGAskyrsbL", "label": "优质线索", "n": "+201009096989", "d": "201009096989", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "MomentoShoes", "g": "埃及", "note": "鞋类, 运动鞋"}, {"rid": "recvowJ00aq7nB", "tid": "tblOUVcGAskyrsbL", "label": "优质线索", "n": "+525514322805", "d": "525514322805", "m": "Hola, soy proveedor de calzado en China. Precio de fábrica, calidad original. ¿Te interesa?", "name": "Buytiti", "g": "墨西哥", "note": "FB用户"}, {"rid": "recvowJ00aLM3a", "tid": "tblOUVcGAskyrsbL", "label": "优质线索", "n": "+966508210102", "d": "966508210102", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "ابراهيم الحازمي (skytocan)", "g": "沙特", "note": "手机号公开在主页"}];
var FANS = [{"rid": "recvowHpsWsWQ1", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201222871478", "d": "201222871478", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61578507609154", "g": "埃及", "note": ""}, {"rid": "recvowHpsWZfaI", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+2039099676", "d": "2039099676", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "100064643367117", "g": "埃及", "note": ""}, {"rid": "recvowHpsWTz6O", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+9884913490", "d": "9884913490", "m": "Hi! I'm a shoe supplier from China (Putian). Factory-direct sneakers, best prices. Want to see our catalog?", "name": "61580712814415", "g": "伊朗", "note": ""}, {"rid": "recvowHpsWaOXy", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201559056195", "d": "201559056195", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61573867263592", "g": "埃及", "note": ""}, {"rid": "recvowHpsWyz9Y", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+971567891230", "d": "971567891230", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "100069817140058", "g": "阿联酋", "note": ""}, {"rid": "recvowHpsWzlpr", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+971504501529", "d": "971504501529", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61579586152540", "g": "阿联酋", "note": ""}, {"rid": "recvowHpsWOKOt", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201015628722", "d": "201015628722", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61577653059770", "g": "埃及", "note": ""}, {"rid": "recvowHpsWOKOt", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201515725756", "d": "201515725756", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61577653059770", "g": "埃及", "note": ""}, {"rid": "recvowHpsWEp47", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201031323711", "d": "201031323711", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "61585418202297", "g": "埃及", "note": ""}, {"rid": "recvowHpsWNEG1", "tid": "tblvluUe1adMKrXc", "label": "批零粉丝", "n": "+201025007100", "d": "201025007100", "m": "السلام عليكم، أنا مورد أحذية من الصين (بوتيان). لدينا أحذية رياضية أصلية بأسعار المصنع. مهتم؟", "name": "Almaghawr", "g": "埃及", "note": ""}];
var FEISHU_TOKEN = "t-g104762CYKLAM3C7GUFFNV6TPO5ARMI2FXW66HNE";
var APP_TOKEN = "XV2tbQN9CahVZVs3DNac2A7hnVg";
var STATE = JSON.parse(localStorage.getItem("wa_state_v2") || "{}");
var currentTab = "premium";

function saveState(){ localStorage.setItem("wa_state_v2", JSON.stringify(STATE)); }
function toast(msg){ var t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(function(){t.style.display="none"},2000); }

function switchTab(tab){
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
    document.querySelectorAll(".panel").forEach(function(p){ p.classList.remove("active"); });
    if(tab==="premium"){ document.querySelector(".tab:nth-child(1)").classList.add("active"); document.getElementById("panelPremium").classList.add("active"); }
    else{ document.querySelector(".tab:nth-child(2)").classList.add("active"); document.getElementById("panelP0").classList.add("active"); }
    updateStats();
}

function updateFeishu(rid, tid, fields, callback){
    fetch("https://open.feishu.cn/open-apis/bitable/v1/apps/"+APP_TOKEN+"/tables/"+tid+"/records/"+rid, {
        method:"PUT", headers:{"Content-Type":"application/json","Authorization":"Bearer "+FEISHU_TOKEN},
        body:JSON.stringify({"fields":fields})
    }).then(function(r){ return r.json(); }).then(function(d){
        if(d.code===0){ if(callback) callback(true); }
        else{ if(callback) callback(false); }
    }).catch(function(){ if(callback) callback(false); });
}

function markContacted(rid, tid, card){
    STATE[rid]={"action":"contacted"}; saveState();
    card.classList.add("done");
    updateFeishu(rid, tid, {"已联系":"是"}, function(ok){ if(!ok) toast("⚠️ 同步失败"); else toast("✅ 已联系"); });
    updateStats();
}

function showReason(rid, card){
    card.querySelector(".reason-input").style.display="block";
    card.querySelector(".reason-save").style.display="inline-block";
    card.querySelector(".btn-skip").style.display="none";
    card.querySelector(".reason-input").focus();
}

function saveReason(rid, tid, card){
    var reason = card.querySelector(".reason-input").value.trim();
    if(!reason){ toast("请填写原因"); return; }
    STATE[rid]={"action":"skipped","reason":reason}; saveState();
    card.classList.add("skipped");
    updateFeishu(rid, tid, {"未联系原因":reason}, function(ok){ if(!ok) toast("⚠️ 同步失败"); else toast("✅ 已备注"); });
    updateStats();
}

function syncAll(){
    var pending=[];
    [PREMIUM,FANS].forEach(function(arr){ arr.forEach(function(d){
        if(!STATE[d.rid]) return;
        var fields={};
        if(STATE[d.rid].action==="contacted") fields["已联系"]="是";
        else if(STATE[d.rid].action==="skipped") fields["未联系原因"]=STATE[d.rid].reason;
        if(Object.keys(fields).length>0) pending.push({rid:d.rid,tid:d.tid,fields:fields});
    }); });
    if(pending.length===0){ toast("没有需要同步的"); return; }
    toast("正在同步 "+pending.length+" 条...");
    var done=0;
    pending.forEach(function(p,i){ setTimeout(function(){ updateFeishu(p.rid,p.tid,p.fields,function(ok){ done++; if(done===pending.length) toast("✅ 同步完成:"+done); }); },i*300); });
}

function sendWA(e, digits, msg){ e.preventDefault(); window.open("https://wa.me/"+digits+"?text="+encodeURIComponent(msg), "_blank"); }

function renderList(data, containerId){
    var html="";
    data.forEach(function(d){
        var s=STATE[d.rid], done=s&&s.action==="contacted", skipped=s&&s.action==="skipped";
        var cls=done?" done":(skipped?" skipped":"");
        html+='<div class="card'+cls+'" id="card-'+d.rid+'">';
        html+='<div class="top"><div class="info">';
        html+='<div class="n">'+d.n+'</div>';
        html+='<div class="name">'+(d.name||"-")+'</div>';
        html+='<div class="ctx">'+d.g+'</div></div>';
        if(!done&&!skipped) html+='<a class="send" href="#" onclick="sendWA(event,\''+d.d+'\',\''+d.m.replace(/'/g,"\\'")+'\')">发送</a>';
        html+='</div>';
        if(!done&&!skipped){
            html+='<div class="actions">';
            html+='<button class="btn btn-contact" onclick="markContacted(\''+d.rid+'\',\''+d.tid+'\',document.getElementById(\'card-'+d.rid+'\'))">✓ 已联系</button>';
            html+='<button class="btn btn-skip" onclick="showReason(\''+d.rid+'\',document.getElementById(\'card-'+d.rid+'\'))">✗ 未联系</button>';
            html+='</div>';
            html+='<input class="reason-input" placeholder="原因：账号不存在/无回复/不是目标...">';
            html+='<button class="reason-save" onclick="saveReason(\''+d.rid+'\',\''+d.tid+'\',document.getElementById(\'card-'+d.rid+'\'))">保存备注</button>';
        }else{
            html+='<div class="actions" style="font-size:11px;color:#63636e;">';
            if(done) html+='✅ 已联系';
            if(skipped) html+='⏭️ '+(s.reason||"已备注");
            html+='</div>';
        }
        html+='</div>';
    });
    document.getElementById(containerId).innerHTML=html||'<div style="text-align:center;padding:30px;color:#52525b">全部已处理 ✅</div>';
}

function updateStats(){
    var contacted=0,skipped=0,pending=0,total=0;
    var list = currentTab==="premium"? PREMIUM : FANS;
    list.forEach(function(d){
        total++; var s=STATE[d.rid];
        if(s&&s.action==="contacted") contacted++;
        else if(s&&s.action==="skipped") skipped++;
        else pending++;
    });
    document.getElementById("stat").innerHTML="已联系 "+contacted+"<br>未联系 "+skipped+"<br>待处理 "+pending;
    document.getElementById("summary").textContent="已联系:"+contacted+" 未联系:"+skipped+" 待处理:"+pending;
}

function render(){
    renderList(PREMIUM, "listPremium");
    renderList(FANS, "listP0");
    updateStats();
}
render();
</script></body></html>
